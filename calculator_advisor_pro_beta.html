*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{font-family:'TT Norms','Manrope',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#e2e8f0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:radial-gradient(ellipse 1100px 700px at 12% 8%,rgba(59,130,246,.10),transparent 55%),radial-gradient(ellipse 900px 600px at 88% 92%,rgba(6,182,212,.08),transparent 50%),radial-gradient(ellipse 700px 500px at 50% 60%,rgba(124,58,237,.04),transparent 60%),#0a0e17;background-attachment:fixed;letter-spacing:-0.005em}
.tnum{font-variant-numeric:tabular-nums}
.cards-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
@media(max-width:700px){.stat-card{flex:1 1 100%}}
select:focus,input:focus{border-color:#3b82f6!important;outline:none}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.slider-wrap{position:relative;padding:42px 0 28px}
.slider-track{position:relative;height:8px;border-radius:4px;background:linear-gradient(to right,rgba(16,185,129,.18) 0%,rgba(16,185,129,.18) 18.4%,rgba(245,158,11,.18) 18.4%,rgba(245,158,11,.18) 49%,rgba(239,68,68,.18) 49%,rgba(239,68,68,.18) 100%);overflow:hidden}
.slider-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px;transition:background-color .15s ease,box-shadow .15s ease}
.slider-input{position:absolute;left:0;right:0;top:50px;width:100%;height:24px;background:transparent;appearance:none;-webkit-appearance:none;outline:none;cursor:pointer;margin:0;padding:0}
.slider-input::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;cursor:grab;border:none;box-shadow:0 2px 12px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.1),0 0 24px var(--thumb-glow,rgba(59,130,246,.4));transition:transform .12s ease}
.slider-input::-webkit-slider-thumb:hover{transform:scale(1.08)}
.slider-input::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.12)}
.slider-input::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:#fff;cursor:grab;box-shadow:0 2px 12px rgba(0,0,0,.6),0 0 24px var(--thumb-glow,rgba(59,130,246,.4))}
@media(max-width:600px){.slider-wrap{padding:46px 0 32px;touch-action:pan-y pinch-zoom}.slider-input{height:44px;top:39px;touch-action:none}.slider-input::-webkit-slider-thumb{width:32px;height:32px}.slider-input::-moz-range-thumb{width:32px;height:32px}}
.slider-tip{position:absolute;top:0;transform:translateX(-50%);padding:7px 16px;background:#0d1117;border:1px solid;border-radius:10px;font-size:18px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.6);transition:left .08s linear,color .15s ease,border-color .15s ease;pointer-events:none}
.slider-tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid currentColor}
.slider-ticks{display:flex;justify-content:space-between;margin-top:14px;font-size:11px;color:#475569;font-weight:500;font-variant-numeric:tabular-nums}
.tab-row{display:flex;gap:6px;background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:14px;padding:5px;margin-bottom:24px;backdrop-filter:blur(12px)}
.tab-btn{flex:1 1 150px;padding:13px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13.5px;font-weight:600;background:transparent;color:#64748b;letter-spacing:-0.01em;transition:all .18s ease;font-family:inherit}
.tab-btn:hover{color:#94a3b8;background:rgba(30,41,59,.4)}
.tab-btn.active{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(6,182,212,.10));color:#e2e8f0;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.preset-pills{display:flex;gap:8px;flex-wrap:wrap}
.preset-pill{padding:10px 18px;border-radius:999px;border:1px solid #1e293b;background:rgba(17,24,39,.6);color:#94a3b8;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:-0.005em;transition:all .18s ease;font-family:inherit;display:flex;align-items:center;gap:9px;backdrop-filter:blur(8px)}
.preset-pill:hover{border-color:#334155;color:#cbd5e1;background:rgba(30,41,59,.5)}
.preset-pill.active{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(6,182,212,.10));border-color:#3b82f6;color:#e2e8f0;box-shadow:0 0 0 4px rgba(59,130,246,.08),0 8px 24px rgba(59,130,246,.12)}

.preset-pill.active .pill-count{color:#60a5fa;background:rgba(59,130,246,.15)}
.preset-expanded{margin-top:16px;background:linear-gradient(180deg,rgba(17,24,39,.5),rgba(13,17,23,.3));border:1px solid #1e293b;border-radius:16px;padding:22px;animation:fadeUp .35s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.preset-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.preset-name{font-size:20px;font-weight:700;letter-spacing:-0.025em;color:#e2e8f0}
.preset-tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#60a5fa;padding:5px 12px;background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.25);border-radius:999px}
.preset-desc{color:#cbd5e1;font-size:15px;line-height:1.6;margin-bottom:18px;letter-spacing:-0.005em;max-width:720px}
.preset-metrics{display:flex;gap:56px;flex-wrap:wrap;padding-top:18px;border-top:1px solid rgba(30,41,59,.5);justify-content:center}
.preset-metrics > div{text-align:center}
.preset-metric-label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:5px}
.preset-metric-value{font-size:22px;font-weight:700;letter-spacing:-0.025em;font-variant-numeric:tabular-nums;color:#e2e8f0}
.dir-frame{flex:0 0 auto;background:linear-gradient(180deg,rgba(15,23,42,.6),rgba(13,17,23,.4));border:1px solid #1e293b;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:0;min-width:220px}
.dir-title{font-size:12.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:0}
.dir-buttons{display:flex;gap:5px;background:#0a0e17;border:1px solid #1e293b;border-radius:10px;padding:4px;margin-top:auto;margin-bottom:auto}
.dir-btn{padding:11px 28px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.05em;font-family:inherit;display:flex;align-items:center;gap:7px;background:transparent;color:#475569;transition:all .15s ease}
.dir-btn:hover:not(.active){color:#94a3b8}
.dir-btn.buy.active{background:linear-gradient(180deg,#10b981,#059669);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3),inset 0 1px 0 rgba(255,255,255,.15)}
.dir-btn.sell.active{background:linear-gradient(180deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.3),inset 0 1px 0 rgba(255,255,255,.15)}
.grp-row{display:grid;grid-template-columns:100px 1fr 1fr;gap:14px;align-items:center;margin-bottom:10px}
@media(max-width:520px){.grp-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:6px 10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(30,41,59,.4)}.grp-label{grid-column:1/-1;margin-bottom:2px;font-size:13px;color:#cbd5e1;font-weight:600}.grp-row .p-input{min-width:0;width:100%}.grp-row input{font-size:14px!important}.grp-suffix{font-size:11px}}

.p-input{background:#0a0e17;border:1px solid #1e293b;border-radius:10px;padding:11px 14px;color:#e2e8f0;font-size:14.5px;font-family:inherit;font-variant-numeric:tabular-nums;width:100%;outline:none;box-sizing:border-box;transition:all .15s ease;letter-spacing:-0.005em}

.p-input:focus{border-color:#3b82f6;background:#0d1320;box-shadow:0 0 0 4px rgba(59,130,246,.08)}
.p-input.err{border-color:#ef4444}

.p-section-label{font-size:12.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:14px;display:flex;align-items:center}
.stat-card{background:linear-gradient(180deg,rgba(17,24,39,.7),rgba(13,17,23,.5));border:1px solid #1e293b;border-radius:14px;padding:18px 20px;flex:1 1 0;min-width:140px;backdrop-filter:blur(8px);transition:border-color .2s ease}
.stat-card:hover{border-color:#334155}
.stat-label{font-size:12px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-0.025em;line-height:1.15;font-variant-numeric:tabular-nums}
.stat-sub{font-size:12.5px;color:#94a3b8;margin-top:6px;letter-spacing:-0.005em}
